<!DOCTYPE html>
<html lang="en" data-kit="{{SLUG}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{TITLE}} — Gunpla build gallery." />
    <title>{{TITLE}} — Gunpla — Chesster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>

    <main class="review-page">
      <a class="back-btn" href="../gunpla.html">← Back to Gunpla</a>
      <article class="review-detail static-page static-page--gunpla" aria-labelledby="gunpla-kit-title">
        <div class="static-page__inner static-page__inner--gunpla">
          <h1 id="gunpla-kit-title" class="static-page__title">{{TITLE}}</h1>
          <div
            class="gunpla-kit-review review-detail__body"
            id="gunpla-kit-review"
            hidden
            aria-label="{{TITLE}} review"
          ></div>
        </div>
        <div
          class="gunpla-gallery"
          id="gunpla-kit-gallery"
          role="region"
          aria-label="{{TITLE}} photos"
        ></div>
      </article>
    </main>

    <script type="module" src="/src/gunpla-detail.js"></script>
  </body>
</html>
